<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Date Request</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --rose:#b0225a;          /* deep rose for display text */
    --rose-btn:#c21f63;      /* pink action button */
    --rose-btn-2:#e0417f;    /* button gradient end */
    --ink:#3a2b31;           /* body text */
    --muted:#9a8a90;         /* secondary text */
    --card:#ffffff;
    --line:#efe6ea;
    --sel:#b0225a;           /* selected state */
    --bg1:#f7e9ef;
    --bg2:#efe6f3;
    --bg3:#f6eef0;
  }

  *{box-sizing:border-box;margin:0;padding:0;}

  html,body{height:100%;}

  body{
    font-family:'Inter',system-ui,sans-serif;
    color:var(--ink);
    background:
      radial-gradient(1200px 800px at 20% 0%, var(--bg1), transparent 60%),
      radial-gradient(1000px 700px at 90% 20%, var(--bg2), transparent 55%),
      linear-gradient(160deg, var(--bg3), #f2e9ee);
    min-height:100dvh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px 16px;
    overflow-x:hidden;
  }

  .screen{display:none;width:100%;max-width:440px;animation:pop .45s cubic-bezier(.2,.9,.3,1.3);}
  .screen.active{display:block;}

  @keyframes pop{
    from{opacity:0;transform:translateY(14px) scale(.97);}
    to{opacity:1;transform:none;}
  }

  .card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:26px;
    padding:34px 28px;
    box-shadow:0 24px 60px -28px rgba(120,40,70,.35);
  }

  h1{
    font-family:'Playfair Display',serif;
    color:var(--rose);
    font-weight:700;
    line-height:1.15;
    text-align:center;
    letter-spacing:.2px;
  }

  /* ---------- Screen 1: the ask ---------- */
  #s1 h1{font-size:2rem;margin-bottom:34px;}

  .ask-btns{position:relative;height:150px;}

  .btn-yes{
    display:block;width:100%;border:none;cursor:pointer;
    padding:18px;border-radius:999px;
    font-family:'Inter',sans-serif;font-size:1.15rem;font-weight:600;color:#fff;
    background:linear-gradient(90deg,var(--rose-btn),var(--rose-btn-2));
    box-shadow:0 12px 26px -10px rgba(194,31,99,.7);
    transition:transform .15s ease, box-shadow .15s ease;
  }
  .btn-yes:hover{transform:translateY(-2px);box-shadow:0 16px 30px -10px rgba(194,31,99,.75);}
  .btn-yes:active{transform:translateY(0);}

  .btn-no{
    position:absolute;left:50%;top:82px;transform:translateX(-50%);
    border:1px solid var(--line);background:#fff;color:var(--muted);cursor:pointer;
    padding:12px 26px;border-radius:999px;font-size:1rem;font-weight:500;
    transition:transform .18s ease, opacity .18s ease;
  }

  /* ---------- Screen 2: date + time ---------- */
  #s2 h1, #s3 h1, #s4 h1{font-size:1.8rem;}
  #s2 h1{margin-bottom:6px;}

  .section-label{font-weight:600;color:var(--ink);margin:22px 4px 12px;font-size:1rem;}

  .cal-head{
    display:flex;align-items:center;justify-content:space-between;
    padding:4px 4px 14px;
  }
  .cal-head .month{font-weight:600;font-size:1.05rem;}
  .cal-nav{
    border:none;background:#f6eef1;color:var(--rose);
    width:34px;height:34px;border-radius:50%;cursor:pointer;font-size:1rem;
    display:grid;place-items:center;transition:background .15s;
  }
  .cal-nav:hover{background:#f0dce6;}
  .cal-nav:disabled{opacity:.3;cursor:default;}

  .dow,.grid{display:grid;grid-template-columns:repeat(7,1fr);}
  .dow span{text-align:center;font-size:.78rem;color:var(--muted);padding:6px 0;font-weight:500;}

  .day{
    aspect-ratio:1;display:grid;place-items:center;margin:2px auto;
    width:38px;border-radius:50%;font-size:.95rem;cursor:pointer;color:var(--ink);
    transition:background .12s,color .12s,transform .12s;
  }
  .day.empty{cursor:default;}
  .day.disabled{color:#d8cdd2;cursor:default;}
  .day.pickable:hover{background:#f6eef1;}
  .day.selected{background:var(--sel);color:#fff;font-weight:600;transform:scale(1.05);}

  .times{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
  .time{
    border:1px solid var(--line);background:#fff;color:var(--ink);cursor:pointer;
    padding:12px 4px;border-radius:999px;font-size:.9rem;font-weight:500;
    transition:all .12s;
  }
  .time:hover{border-color:#e6c9d6;}
  .time.selected{background:var(--sel);color:#fff;border-color:var(--sel);font-weight:600;}

  /* ---------- Screen 3: food ---------- */
  .foods{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:8px;}
  .food{
    border:1px solid var(--line);background:#fff;cursor:pointer;
    padding:26px 10px;border-radius:18px;text-align:center;
    transition:all .14s;
  }
  .food:hover{transform:translateY(-2px);border-color:#e6c9d6;}
  .food .emoji{font-size:2.1rem;display:block;margin-bottom:10px;}
  .food .name{font-weight:500;color:var(--ink);}
  .food.selected{border-color:var(--sel);box-shadow:0 0 0 2px var(--sel) inset;background:#fdf5f8;}

  /* ---------- Shared CTA ---------- */
  .cta{
    display:block;width:100%;border:none;cursor:pointer;margin-top:26px;
    padding:16px;border-radius:999px;font-size:1.05rem;font-weight:600;color:#fff;
    background:linear-gradient(90deg,var(--rose-btn),var(--rose-btn-2));
    box-shadow:0 12px 26px -12px rgba(194,31,99,.7);
    transition:transform .15s,opacity .15s;
  }
  .cta:hover{transform:translateY(-2px);}
  .cta:disabled{opacity:.4;cursor:default;transform:none;}

  /* ---------- Screen 4: YAY ---------- */
  #s4 .card{text-align:center;}
  #s4 h1{font-size:2.4rem;margin-bottom:22px;}
  .summary{
    background:#faf3f6;border:1px solid var(--line);border-radius:18px;
    padding:20px 22px;text-align:left;display:flex;flex-direction:column;gap:16px;
    margin-bottom:22px;
  }
  .summary .row{display:flex;align-items:center;gap:14px;font-size:1.1rem;}
  .summary .row .ic{font-size:1.3rem;}
  .closing{
    font-family:'Playfair Display',serif;font-style:italic;
    color:var(--rose);font-size:1.4rem;margin-bottom:20px;
  }
  .footnote{color:var(--muted);font-style:italic;font-size:.9rem;line-height:1.5;}

  /* progress dots */
  .dots{display:flex;gap:8px;justify-content:center;margin-top:20px;}
  .dots i{width:7px;height:7px;border-radius:50%;background:#e3d3da;transition:background .2s;}
  .dots i.on{background:var(--rose);}

  @media (prefers-reduced-motion:reduce){
    *{animation:none!important;transition:none!important;}
  }
</style>
</head>
<body>

<!-- ============ SCREEN 1: THE ASK ============ -->
<section id="s1" class="screen active">
  <div class="card">
    <h1>🌸 Will you go on a date with me? 🌸</h1>
    <div class="ask-btns">
      <button class="btn-yes" onclick="goTo('s2')">YES 🤍</button>
      <button class="btn-no" id="noBtn">NO 🥺</button>
    </div>
  </div>
</section>

<!-- ============ SCREEN 2: DATE + TIME ============ -->
<section id="s2" class="screen">
  <div class="card">
    <h1>So… when are you free? 📅🐾</h1>

    <div class="section-label">Pick a day</div>
    <div class="cal-head">
      <button class="cal-nav" id="prevM" onclick="changeMonth(-1)">‹</button>
      <span class="month" id="monthLabel"></span>
      <button class="cal-nav" id="nextM" onclick="changeMonth(1)">›</button>
    </div>
    <div class="dow"><span>Su</span><span>Mo</span><span>Tu</span><span>We</span><span>Th</span><span>Fr</span><span>Sa</span></div>
    <div class="grid" id="calGrid"></div>

    <div class="section-label">What time?</div>
    <div class="times" id="timeGrid"></div>

    <button class="cta" id="dateCta" onclick="goTo('s3')" disabled>Set the date 🤍</button>
    <div class="dots"><i class="on"></i><i class="on"></i><i></i><i></i></div>
  </div>
</section>

<!-- ============ SCREEN 3: FOOD ============ -->
<section id="s3" class="screen">
  <div class="card">
    <h1>What are we feeling? 🍽️✨</h1>
    <div class="foods" id="foodGrid"></div>
    <button class="cta" id="foodCta" onclick="finish()" disabled>Next 💕</button>
    <div class="dots"><i class="on"></i><i class="on"></i><i class="on"></i><i></i></div>
  </div>
</section>

<!-- ============ SCREEN 4: YAY ============ -->
<section id="s4" class="screen">
  <div class="card">
    <h1>YAY!! 💕</h1>
    <div class="summary">
      <div class="row"><span class="ic">📅</span><span id="sumDate"></span></div>
      <div class="row"><span class="ic">⏰</span><span id="sumTime"></span></div>
      <div class="row"><span class="ic">🍽️</span><span id="sumFood"></span></div>
    </div>
    <div class="closing">I can't wait to see you! 🌷✨</div>
    <div class="footnote">(normal guys send texts, i made a website. i'm not like other guys xx)</div>
    <div class="dots"><i class="on"></i><i class="on"></i><i class="on"></i><i class="on"></i></div>
  </div>
</section>

<script>
  /* ============================================================
     ▼▼▼  ضع هون الـ Access Key الخاص فيك من web3forms.com  ▼▼▼
     اذا تركتها فاضية رح يشتغل الموقع بس ما رح يوصلك ايميل.
     ============================================================ */
  const ACCESS_KEY = "31652833-59e6-41c5-b8c4-73a0db79ba09";

  /* ---------- state ---------- */
  const state = { date:null, time:null, food:null };

  /* ---------- navigation ---------- */
  function goTo(id){
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    const el = document.getElementById(id);
    el.classList.add('active');
    // restart animation
    el.style.animation='none'; el.offsetHeight; el.style.animation='';
    window.scrollTo(0,0);
  }

  /* ---------- Screen 1: runaway NO ---------- */
  const noBtn = document.getElementById('noBtn');
  let noScale = 1;
  function dodge(){
    const pad = 20;
    const w = window.innerWidth, h = window.innerHeight;
    const bw = noBtn.offsetWidth, bh = noBtn.offsetHeight;
    const x = Math.random()*(w - bw - pad*2) + pad;
    const y = Math.random()*(h - bh - pad*2) + pad;
    noScale = Math.max(0.55, noScale - 0.08);
    noBtn.style.position = 'fixed';
    noBtn.style.left = x + 'px';
    noBtn.style.top  = y + 'px';
    noBtn.style.transform = 'scale(' + noScale + ')';
  }
  noBtn.addEventListener('mouseover', dodge);
  noBtn.addEventListener('click', function(e){ e.preventDefault(); dodge(); });
  noBtn.addEventListener('touchstart', function(e){ e.preventDefault(); dodge(); }, {passive:false});

  /* ---------- Screen 2: calendar ---------- */
  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const today = new Date(); today.setHours(0,0,0,0);
  let viewYear = today.getFullYear(), viewMonth = today.getMonth();

  function renderCalendar(){
    document.getElementById('monthLabel').textContent = MONTHS[viewMonth] + ' ' + viewYear;
    const grid = document.getElementById('calGrid');
    grid.innerHTML = '';
    const firstDow = new Date(viewYear, viewMonth, 1).getDay();
    const daysInMonth = new Date(viewYear, viewMonth+1, 0).getDate();

    for(let i=0;i<firstDow;i++){
      const e = document.createElement('div'); e.className='day empty'; grid.appendChild(e);
    }
    for(let d=1; d<=daysInMonth; d++){
      const cell = document.createElement('div');
      const cellDate = new Date(viewYear, viewMonth, d);
      cell.textContent = d;
      if(cellDate < today){
        cell.className = 'day disabled';
      }else{
        cell.className = 'day pickable';
        if(state.date && state.date.getTime()===cellDate.getTime()) cell.classList.add('selected');
        cell.onclick = ()=>{ state.date = cellDate; renderCalendar(); updateDateCta(); };
      }
      grid.appendChild(cell);
    }
    // disable prev nav past current month
    const prev = document.getElementById('prevM');
    prev.disabled = (viewYear===today.getFullYear() && viewMonth===today.getMonth());
  }
  function changeMonth(delta){
    viewMonth += delta;
    if(viewMonth<0){viewMonth=11;viewYear--;}
    if(viewMonth>11){viewMonth=0;viewYear++;}
    renderCalendar();
  }

  /* ---------- Screen 2: times ---------- */
  const TIMES = ['12:00 PM','1:00 PM','2:00 PM','3:00 PM','4:00 PM','5:00 PM','6:00 PM','6:30 PM','7:00 PM','7:30 PM','8:00 PM','8:30 PM'];
  function renderTimes(){
    const grid = document.getElementById('timeGrid');
    grid.innerHTML='';
    TIMES.forEach(t=>{
      const b = document.createElement('button');
      b.className='time'; b.textContent=t;
      if(state.time===t) b.classList.add('selected');
      b.onclick=()=>{ state.time=t; renderTimes(); updateDateCta(); };
      grid.appendChild(b);
    });
  }
  function updateDateCta(){
    document.getElementById('dateCta').disabled = !(state.date && state.time);
  }

  /* ---------- Screen 3: food ---------- */
  const FOODS = [
    {name:'Pizza',emoji:'🍕'},{name:'Sushi',emoji:'🍣'},
    {name:'Burgers',emoji:'🍔'},{name:'Pasta',emoji:'🍝'},
    {name:'Tacos',emoji:'🌮'},{name:'Ramen',emoji:'🍜'}
  ];
  function renderFoods(){
    const grid = document.getElementById('foodGrid');
    grid.innerHTML='';
    FOODS.forEach(f=>{
      const c = document.createElement('div');
      c.className='food';
      if(state.food===f.name) c.classList.add('selected');
      c.innerHTML = '<span class="emoji">'+f.emoji+'</span><span class="name">'+f.name+'</span>';
      c.onclick=()=>{ state.food=f.name; renderFoods(); document.getElementById('foodCta').disabled=false; };
      grid.appendChild(c);
    });
  }

  /* ---------- Screen 4: finish ---------- */
  function finish(){
    const d = state.date;
    const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const dateStr = days[d.getDay()] + ', ' + MONTHS[d.getMonth()] + ' ' + d.getDate();
    document.getElementById('sumDate').textContent = dateStr;
    document.getElementById('sumTime').textContent = state.time;
    document.getElementById('sumFood').textContent = state.food;
    goTo('s4');
    sendAnswer(dateStr);   // بعث الاجابة عالايميل
  }

  /* ---------- send the answer to your email ---------- */
  function sendAnswer(dateStr){
    if(!ACCESS_KEY) return; // ما في مفتاح => ما نبعت شي (تجربة محلية)
    const payload = {
      access_key: ACCESS_KEY,
      subject: "She said YES 💕 — Date confirmed!",
      from_name: "Date Request",
      message:
        "🌸 The answer is YES!\n\n" +
        "📅 Day:  " + dateStr + "\n" +
        "⏰ Time: " + state.time + "\n" +
        "🍽️ Food: " + state.food + "\n"
    };
    fetch("https://api.web3forms.com/submit", {
      method: "POST",
      headers: { "Content-Type": "application/json", "Accept": "application/json" },
      body: JSON.stringify(payload)
    }).catch(function(){ /* حتى لو فشل الارسال، الصفحة تكمل عادي */ });
  }

  /* ---------- init ---------- */
  renderCalendar();
  renderTimes();
  renderFoods();
</script>
</body>
</html>
